name: DevSecOps Attested Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  # The signing key is stored as a GitHub Actions secret.
  # Generate with: go run ./cmd/keygen
  # Store the hex-encoded private key as ATTESTATION_SIGNING_KEY
  ARTIFACT_REF: ${{ github.sha }}
  APP_NAME: ${{ github.repository }}

jobs:
  # Run the full unit test suite before any security or signing steps.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run unit tests with coverage
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1

      - name: Run unit tests with race detector
        run: go test -race ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.sha }}
          path: coverage.out
          retention-days: 7

  # Phase 1 + 2: Run security checks, sign each result, build chain
  security-checks:
    needs: test
    runs-on: ubuntu-latest
    if: "github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'"
    env:
      GITLEAKS_VERSION: '8.21.2'
    outputs:
      chain-artifact: ${{ steps.upload-chain.outputs.artifact-id }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build attestation tooling
        run: |
          mkdir -p bin
          go build -o ./bin/keygen ./cmd/keygen
          go build -o ./bin/attest ./cmd/sign
          go build -o ./bin/verify ./cmd/verify
          go build -o ./bin/gate ./cmd/gate

      # SAST
      - name: Run SAST (semgrep)
        id: sast
        continue-on-error: true
        run: |
          echo '{"passed":true,"findings":[]}' > sast-results.json
          pip install --quiet semgrep
          semgrep scan --json --output semgrep-raw.json --no-error-on-empty-scan . || true
          if jq -e . semgrep-raw.json >/dev/null 2>&1; then
            jq '{
              passed: ((.results // []) | length) == 0,
              findings: [(.results // [])[] | {
                id: .check_id,
                severity: (.extra.severity | if . == "ERROR" then "critical"
                                             elif . == "WARNING" then "high"
                                             else "medium" end),
                title: .extra.message,
                location: (.path + ":" + (.start.line | tostring))
              }]
            }' semgrep-raw.json > sast-results.json
          fi

      - name: Sign SAST attestation
        run: |
          ./bin/attest sign \
            --check-type sast \
            --tool semgrep \
            --tool-version "$(semgrep --version 2>/dev/null || echo unknown)" \
            --result sast-results.json \
            --target-ref "$ARTIFACT_REF" \
            --subject "$APP_NAME" \
            --signing-key "${{ secrets.ATTESTATION_SIGNING_KEY }}" \
            --chain attestation-chain.json

      # SCA
      - name: Run SCA (trivy)
        id: sca
        continue-on-error: true
        run: |
          echo '{"passed":true,"findings":[]}' > sca-results.json
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin || true
          trivy fs --format json --output trivy-raw.json . || true
          if jq -e . trivy-raw.json >/dev/null 2>&1; then
            jq '{
              passed: (([(.Results // [])[]? | (.Vulnerabilities // [])[]
                         | select(.Severity == "CRITICAL" or .Severity == "HIGH")]
                        | length) == 0),
              findings: [(.Results // [])[]? | (.Vulnerabilities // [])[] | {
                id: .VulnerabilityID,
                severity: (.Severity | ascii_downcase),
                title: (.Title // .VulnerabilityID),
                location: .PkgName
              }]
            }' trivy-raw.json > sca-results.json
          fi

      - name: Sign SCA attestation
        run: |
          ./bin/attest sign \
            --check-type sca \
            --tool trivy \
            --tool-version "$(trivy --version 2>/dev/null | head -1 || echo unknown)" \
            --result sca-results.json \
            --target-ref "$ARTIFACT_REF" \
            --subject "$APP_NAME" \
            --signing-key "${{ secrets.ATTESTATION_SIGNING_KEY }}" \
            --chain attestation-chain.json

      # Config / IaC
      - name: Run config check (checkov)
        id: config
        continue-on-error: true
        run: |
          echo '{"passed":true,"findings":[]}' > config-results.json
          pip install --quiet checkov
          checkov -d . --output json --output-file-path . --quiet || true
          mv results.json checkov-raw.json 2>/dev/null || echo 'null' > checkov-raw.json
          if jq -e . checkov-raw.json >/dev/null 2>&1; then
            jq '{
              passed: ((.results.failed_checks // []) | length) == 0,
              findings: [(.results.failed_checks // [])[] | {
                id: .check_id,
                severity: "medium",
                title: (.check_id + ": " + (.check_type // "config")),
                location: (.file_path // "unknown")
              }]
            }' checkov-raw.json > config-results.json
          fi

      - name: Sign config attestation
        run: |
          ./bin/attest sign \
            --check-type config \
            --tool checkov \
            --tool-version "$(checkov --version 2>/dev/null || echo unknown)" \
            --result config-results.json \
            --target-ref "$ARTIFACT_REF" \
            --subject "$APP_NAME" \
            --signing-key "${{ secrets.ATTESTATION_SIGNING_KEY }}" \
            --chain attestation-chain.json

      # Secret scan
      - name: Run secret scan (gitleaks)
        id: secrets
        continue-on-error: true
        run: |
          echo '{"passed":true,"findings":[]}' > secret-results.json
          wget -qO- \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz gitleaks || true
          sudo mv gitleaks /usr/local/bin/ 2>/dev/null || true
          gitleaks detect --report-format json --report-path gitleaks-raw.json || true
          if jq -e 'if . == null then empty else . end' gitleaks-raw.json >/dev/null 2>&1; then
            jq '{
              passed: (length == 0),
              findings: [.[] | {
                id: .RuleID,
                severity: "high",
                title: .Description,
                location: (.File + ":" + (.StartLine | tostring))
              }]
            }' gitleaks-raw.json > secret-results.json
          fi

      - name: Sign secret scan attestation
        run: |
          ./bin/attest sign \
            --check-type secret \
            --tool gitleaks \
            --tool-version "$(gitleaks version 2>/dev/null || echo unknown)" \
            --result secret-results.json \
            --target-ref "$ARTIFACT_REF" \
            --subject "$APP_NAME" \
            --signing-key "${{ secrets.ATTESTATION_SIGNING_KEY }}" \
            --chain attestation-chain.json

      - name: Verify chain integrity
        run: |
          ./bin/verify \
            --chain attestation-chain.json \
            --verify-signer "${{ secrets.ATTESTATION_PUBLIC_KEY }}"

      - name: Upload attestation chain
        id: upload-chain
        uses: actions/upload-artifact@v7
        with:
          name: attestation-chain-${{ github.sha }}
          path: attestation-chain.json
          retention-days: 90

  # Deploy gate: verify chain and evaluate policy
  deploy-gate:
    needs: security-checks
    runs-on: ubuntu-latest
    environment: production
    if: "github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'"
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build binaries
        run: |
          mkdir -p bin release
          go build -o ./bin/gate    ./cmd/gate
          go build -o ./release/keygen ./cmd/keygen
          go build -o ./release/attest ./cmd/sign
          go build -o ./release/verify ./cmd/verify
          go build -o ./release/gate   ./cmd/gate

      - name: Download attestation chain
        uses: actions/download-artifact@v8
        with:
          name: attestation-chain-${{ github.sha }}

      - name: Evaluate deploy gate
        id: gate
        run: |
          ./bin/gate evaluate \
            --chain attestation-chain.json \
            --verify-signer "${{ secrets.ATTESTATION_PUBLIC_KEY }}" \
            --policy .github/policies/deploy.rego \
            --output gate-decision.json

      - name: Check gate decision
        run: |
          ALLOW=$(jq -r '.allow' gate-decision.json)
          REASONS=$(jq -r '.reasons[]' gate-decision.json)
          echo "Gate decision: $ALLOW"
          echo "Reasons: $REASONS"
          if [ "$ALLOW" != "true" ]; then
            echo "::error::Deploy gate blocked: $REASONS"
            exit 1
          fi

      - name: Package release artifacts
        run: |
          cp attestation-chain.json release/
          cp gate-decision.json     release/
          echo "$ARTIFACT_REF" > release/COMMIT

      - name: Attest release provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            release/keygen
            release/attest
            release/verify
            release/gate

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ github.sha }}
          path: release/
          retention-days: 30
