<svg width="100%" viewBox="0 0 760 680" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- GitHub Actions container -->
<rect x="30" y="20" width="460" height="415" rx="14" fill="none"
  stroke="rgba(222, 220, 209, 0.3)" stroke-width="1" stroke-dasharray="6 4"/>
<text x="50" y="42" fill="rgb(194, 192, 182)" font-family="sans-serif" font-size="12">GitHub Actions pipeline</text>

<!-- SAST scan -->
<rect x="50" y="55" width="130" height="56" rx="8"
  fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
<text x="115" y="77" text-anchor="middle" dominant-baseline="central"
  fill="rgb(159, 225, 203)" font-family="sans-serif" font-size="14" font-weight="500">SAST scan</text>
<text x="115" y="95" text-anchor="middle" dominant-baseline="central"
  fill="rgb(93, 202, 165)" font-family="sans-serif" font-size="12">semgrep</text>

<!-- SCA scan -->
<rect x="50" y="150" width="130" height="56" rx="8"
  fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
<text x="115" y="172" text-anchor="middle" dominant-baseline="central"
  fill="rgb(159, 225, 203)" font-family="sans-serif" font-size="14" font-weight="500">SCA scan</text>
<text x="115" y="190" text-anchor="middle" dominant-baseline="central"
  fill="rgb(93, 202, 165)" font-family="sans-serif" font-size="12">trivy</text>

<!-- Config scan -->
<rect x="50" y="245" width="130" height="56" rx="8"
  fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
<text x="115" y="267" text-anchor="middle" dominant-baseline="central"
  fill="rgb(159, 225, 203)" font-family="sans-serif" font-size="14" font-weight="500">Config scan</text>
<text x="115" y="285" text-anchor="middle" dominant-baseline="central"
  fill="rgb(93, 202, 165)" font-family="sans-serif" font-size="12">checkov</text>

<!-- Secret scan -->
<rect x="50" y="340" width="130" height="56" rx="8"
  fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
<text x="115" y="362" text-anchor="middle" dominant-baseline="central"
  fill="rgb(159, 225, 203)" font-family="sans-serif" font-size="14" font-weight="500">Secret scan</text>
<text x="115" y="380" text-anchor="middle" dominant-baseline="central"
  fill="rgb(93, 202, 165)" font-family="sans-serif" font-size="12">gitleaks</text>

<!-- Attestation 1 -->
<rect x="230" y="55" width="140" height="56" rx="8"
  fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
<text x="300" y="77" text-anchor="middle" dominant-baseline="central"
  fill="rgb(206, 203, 246)" font-family="sans-serif" font-size="14" font-weight="500">Attestation&#x2081;</text>
<text x="300" y="95" text-anchor="middle" dominant-baseline="central"
  fill="rgb(175, 169, 236)" font-family="sans-serif" font-size="12">sast &#xB7; signed &#xB7; log_entry</text>

<!-- Attestation 2 -->
<rect x="230" y="150" width="140" height="56" rx="8"
  fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
<text x="300" y="172" text-anchor="middle" dominant-baseline="central"
  fill="rgb(206, 203, 246)" font-family="sans-serif" font-size="14" font-weight="500">Attestation&#x2082;</text>
<text x="300" y="190" text-anchor="middle" dominant-baseline="central"
  fill="rgb(175, 169, 236)" font-family="sans-serif" font-size="12">sca &#xB7; chains to att&#x2081;</text>

<!-- Attestation 3 -->
<rect x="230" y="245" width="140" height="56" rx="8"
  fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
<text x="300" y="267" text-anchor="middle" dominant-baseline="central"
  fill="rgb(206, 203, 246)" font-family="sans-serif" font-size="14" font-weight="500">Attestation&#x2083;</text>
<text x="300" y="285" text-anchor="middle" dominant-baseline="central"
  fill="rgb(175, 169, 236)" font-family="sans-serif" font-size="12">config &#xB7; chains to att&#x2082;</text>

<!-- Attestation 4 -->
<rect x="230" y="340" width="140" height="56" rx="8"
  fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
<text x="300" y="362" text-anchor="middle" dominant-baseline="central"
  fill="rgb(206, 203, 246)" font-family="sans-serif" font-size="14" font-weight="500">Attestation&#x2084;</text>
<text x="300" y="380" text-anchor="middle" dominant-baseline="central"
  fill="rgb(175, 169, 236)" font-family="sans-serif" font-size="12">secret &#xB7; chains to att&#x2083;</text>

<!-- Arrows: scan step -> attestation -->
<line x1="180" y1="83"  x2="228" y2="83"  stroke="rgb(156, 154, 146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="180" y1="178" x2="228" y2="178" stroke="rgb(156, 154, 146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="180" y1="273" x2="228" y2="273" stroke="rgb(156, 154, 146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="180" y1="368" x2="228" y2="368" stroke="rgb(156, 154, 146)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Chain arrows (SHA-256 linkage between attestations) -->
<line x1="300" y1="111" x2="300" y2="148" stroke="rgb(156, 154, 146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="300" y1="206" x2="300" y2="243" stroke="rgb(156, 154, 146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="300" y1="301" x2="300" y2="338" stroke="rgb(156, 154, 146)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Path from att4 to gate (exits container, routes to gate box) -->
<path d="M300 396 L300 445 L250 445 L250 458" fill="none"
  stroke="rgba(222, 220, 209, 0.3)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Gate layer 1: Chain + signer verification -->
<rect x="60" y="460" width="380" height="56" rx="8"
  fill="rgb(99, 56, 6)" stroke="rgb(239, 159, 39)" stroke-width="0.5"/>
<text x="250" y="482" text-anchor="middle" dominant-baseline="central"
  fill="rgb(250, 199, 117)" font-family="sans-serif" font-size="14" font-weight="500">Chain + signer verification</text>
<text x="250" y="500" text-anchor="middle" dominant-baseline="central"
  fill="rgb(239, 159, 39)" font-family="sans-serif" font-size="12">VerifyChain &#xB7; authorized signers &#xB7; log entries &#xB7; policy hash</text>

<line x1="250" y1="516" x2="250" y2="528" stroke="rgb(156, 154, 146)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Gate layer 2: OPA policy evaluation -->
<rect x="100" y="530" width="300" height="56" rx="8"
  fill="rgb(99, 56, 6)" stroke="rgb(239, 159, 39)" stroke-width="0.5"/>
<text x="250" y="552" text-anchor="middle" dominant-baseline="central"
  fill="rgb(250, 199, 117)" font-family="sans-serif" font-size="14" font-weight="500">OPA policy evaluation</text>
<text x="250" y="570" text-anchor="middle" dominant-baseline="central"
  fill="rgb(239, 159, 39)" font-family="sans-serif" font-size="12">deploy.rego &#xB7; authorized_signers &#xB7; findings</text>

<line x1="250" y1="586" x2="250" y2="598" stroke="rgb(156, 154, 146)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Deploy gate: ALLOW / BLOCK -->
<rect x="155" y="600" width="190" height="56" rx="8"
  fill="rgb(39, 80, 10)" stroke="rgb(151, 196, 89)" stroke-width="0.5"/>
<text x="250" y="622" text-anchor="middle" dominant-baseline="central"
  fill="rgb(192, 221, 151)" font-family="sans-serif" font-size="14" font-weight="500">Deploy gate</text>
<text x="250" y="640" text-anchor="middle" dominant-baseline="central"
  fill="rgb(151, 196, 89)" font-family="sans-serif" font-size="12">ALLOW / BLOCK</text>

<!-- Transparency log (right, aligned with att1) -->
<rect x="530" y="55" width="210" height="70" rx="8"
  fill="rgb(68, 68, 65)" stroke="rgb(180, 178, 169)" stroke-width="0.5"/>
<text x="635" y="78" text-anchor="middle" dominant-baseline="central"
  fill="rgb(211, 209, 199)" font-family="sans-serif" font-size="14" font-weight="500">Transparency log</text>
<text x="635" y="96" text-anchor="middle" dominant-baseline="central"
  fill="rgb(180, 178, 169)" font-family="sans-serif" font-size="12">log_entry URL stored</text>
<text x="635" y="114" text-anchor="middle" dominant-baseline="central"
  fill="rgb(156, 154, 146)" font-family="sans-serif" font-size="11">Rekor integration: PhD scope</text>

<!-- Arrow att1 -> transparency log (dashed) -->
<path d="M370 83 L528 83" fill="none"
  stroke="rgb(136, 135, 128)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Per-check-type key pairs (right, middle of chain) -->
<rect x="530" y="255" width="210" height="70" rx="8"
  fill="rgb(68, 68, 65)" stroke="rgb(180, 178, 169)" stroke-width="0.5"/>
<text x="635" y="278" text-anchor="middle" dominant-baseline="central"
  fill="rgb(211, 209, 199)" font-family="sans-serif" font-size="14" font-weight="500">Per-check-type keys</text>
<text x="635" y="296" text-anchor="middle" dominant-baseline="central"
  fill="rgb(180, 178, 169)" font-family="sans-serif" font-size="12">4 independent Ed25519 pairs</text>
<text x="635" y="314" text-anchor="middle" dominant-baseline="central"
  fill="rgb(156, 154, 146)" font-family="sans-serif" font-size="11">sast &#xB7; sca &#xB7; config &#xB7; secret</text>

<!-- Arrow key pairs -> gate layer 1 (authorized signers, dashed) -->
<path d="M635 325 L635 488 L442 488" fill="none"
  stroke="rgb(136, 135, 128)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

</svg>
